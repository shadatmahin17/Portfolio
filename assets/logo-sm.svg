<svg width="220" height="170" viewBox="0 0 220 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">SM Logo</title>
  <desc id="logoDesc">Stylized SH Mahin monogram in white and gold.</desc>
  <defs>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5C97A"/>
      <stop offset="100%" stop-color="#C9A34E"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- S -->
  <text x="18" y="122" font-size="150" font-family="Georgia, 'Times New Roman', serif" fill="url(#darkGrad)" filter="url(#softShadow)">S</text>

  <!-- Gold slash accent -->
  <path d="M104 56L118 62L95 132L81 126L104 56Z" fill="url(#goldGrad)"/>

  <!-- M -->
  <text x="88" y="134" font-size="145" font-family="Georgia, 'Times New Roman', serif" fill="url(#darkGrad)" filter="url(#softShadow)">M</text>
</svg>
